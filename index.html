<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro | Command Center</title>
  <style>
    :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --success: #10b981; --error: #ef4444; --text: #f8fafc; --text-muted: #94a3b8; --border: #1e293b; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    
    .container { max-width: 1400px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 900; letter-spacing: 2px; color: var(--accent); margin: 0; }
    
    .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
    .stat-value { font-size: 32px; font-weight: 900; color: #fff; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 8px; font-weight: bold; letter-spacing: 1px; }

    .devices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 25px; }
    .device-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .device-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 40px -15px rgba(99, 102, 241, 0.4); }
    
    .device-header { padding: 30px; border-bottom: 1px solid var(--border); }
    .local-name { font-size: 12px; font-weight: 900; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
    .user-name { font-size: 20px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 12px; }
    
    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--success); }
    .status-dot.offline { background: #475569; }
    .pulse { animation: pulse-animation 2s infinite; }
    @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.8); } 100% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); } }

    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
    .meta-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
    .meta-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; font-weight: bold; }
    .meta-val { font-size: 13px; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .actions-row { padding: 20px 30px; background: rgba(0,0,0,0.15); display: flex; gap: 12px; justify-content: space-between; }
    .btn { flex:1; padding: 12px; border-radius: 12px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-log { background: var(--border); color: #fff; }
    .btn-delete { background: rgba(239, 68, 68, 0.15); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-delete:hover { background: var(--error); color: #fff; }

    .logs-drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: #000; }
    .logs-drawer.open { max-height: 500px; overflow-y: auto; padding: 25px; border-top: 1px solid var(--border); }
    .log-entry { font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-bottom: 10px; display: flex; gap: 12px; line-height: 1.4; }
    .log-time { color: var(--text-muted); min-width: 75px; }
    .log-type-INFO { color: #2ecc71; font-weight: bold; }
    .log-type-WARNING { color: #f1c40f; font-weight: bold; }
    .log-type-ERROR { color: #e74c3c; font-weight: bold; }
    
    #statusBanner { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #fff; padding: 15px 30px; border-radius: 100px; font-size: 13px; font-weight: 800; box-shadow: 0 15px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; z-index: 100; }
    .btn-main { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 900; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛰️ STOCKPRO <span style="font-weight:200; color:var(--text-muted);">MASTER MONITOR</span></h1>
      <div style="display:flex; gap:12px;">
        <button class="btn-main" style="background:rgba(239, 68, 68, 0.2); color:var(--error);" onclick="clearServer()">RESET DB</button>
        <button class="btn-main" onclick="loadData()">SYNC NOW</button>
      </div>
    </header>

    <div class="dashboard-stats">
      <div class="stat-card"><div id="totalNodes" class="stat-value">0</div><div class="stat-label">Total Nodos</div></div>
      <div class="stat-card"><div id="onlineNodes" class="stat-value" style="color:var(--success);">0</div><div class="stat-label">En Línea</div></div>
      <div class="stat-card"><div id="totalEvents" class="stat-value">0</div><div class="stat-label">Eventos Totales</div></div>
    </div>

    <div id="devicesGrid" class="devices-grid">
      <div style="grid-column: 1/-1; text-align:center; padding:100px; color:#475569; font-weight:bold;">ESTABLECIENDO ENLACE CON SATÉLITE...</div>
    </div>
  </div>

  <div id="statusBanner">
    <div class="status-dot pulse"></div>
    LINK ACTIVE
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_PC4v24holQF45lKU3RmxGV2lNYDuyAV4u5vmDmg/exec';
    let expanded = new Set();

    async function loadData() {
      try {
        const res = await fetch(SCRIPT_URL, { redirect: 'follow' });
        const data = await res.json();
        render(data.logs || []);
        document.getElementById('statusBanner').style.background = '#6366f1';
        document.getElementById('statusBanner').innerHTML = '<div class="status-dot pulse"></div> LINK ACTIVE';
      } catch (e) {
        document.getElementById('statusBanner').style.background = '#ef4444';
        document.getElementById('statusBanner').innerHTML = 'LINK DISCONNECTED';
      }
    }

    function render(logs) {
      const grouped = {};
      logs.forEach(l => {
        if(!grouped[l.deviceId]) grouped[id=l.deviceId] = [];
        grouped[l.deviceId].push(l);
      });

      const grid = document.getElementById('devicesGrid');
      grid.innerHTML = '';
      
      const ids = Object.keys(grouped);
      document.getElementById('totalNodes').textContent = ids.length;
      document.getElementById('totalEvents').textContent = logs.length;

      let onlineCount = 0;

      ids.forEach(id => {
        const dLogs = grouped[id].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        const last = dLogs[0];
        
        const diff = (new Date() - new Date(last.timestamp)) / 1000 / 60;
        const isOnline = diff < 5;
        if(isOnline) onlineCount++;

        const card = document.createElement('div');
        card.className = 'device-card';
        card.innerHTML = `
          <div class="device-header">
            <div class="local-name">${last.usuario.split('(')[1]?.replace(')','') || 'Local Master'}</div>
            <div class="user-name">
              <div class="status-dot ${isOnline ? 'pulse' : 'offline'}"></div>
              ${last.usuario.split('(')[0] || 'Operador'}
            </div>
            
            <div class="meta-grid">
              <div class="meta-box"><span class="meta-label">IP Address</span><span class="meta-val">${last.ip || '0.0.0.0'}</span></div>
              <div class="meta-box"><span class="meta-label">Versión</span><span class="meta-val">${last.version || 'v1.0.8'}</span></div>
              <div class="meta-box"><span class="meta-label">Hardware</span><span class="meta-val">${last.model || 'Nativo'}</span></div>
              <div class="meta-box"><span class="meta-label">Status</span><span class="meta-val">${isOnline ? 'EN LÍNEA' : 'OFFLINE'}</span></div>
            </div>
          </div>
          <div class="actions-row">
             <button class="btn btn-log" onclick="toggleLogs('${id}')">HISTORIAL</button>
             <button class="btn btn-delete" onclick="deleteNode('${id}')">ELIMINAR</button>
          </div>
          <div id="drawer-${id}" class="logs-drawer ${expanded.has(id) ? 'open' : ''}">
            ${dLogs.map(l => `
              <div class="log-entry">
                <span class="log-time">${new Date(l.timestamp).toLocaleTimeString()}</span>
                <span class="log-type-${l.event.split('_')[0]}">[${l.event.split('_')[0]}]</span>
                <span style="color:#fff; font-weight:900;">${l.event.split('_').slice(1).join(' ') || l.event}</span>
                <span style="color:var(--text-muted)">${l.message}</span>
              </div>
            `).join('')}
          </div>
        `;
        grid.appendChild(card);
      });
      document.getElementById('onlineNodes').textContent = onlineCount;
    }

    function toggleLogs(id) {
      const d = document.getElementById(`drawer-${id}`);
      if(d.classList.contains('open')) { d.classList.remove('open'); expanded.delete(id); }
      else { d.classList.add('open'); expanded.add(id); }
    }

    async function deleteNode(id) {
      if(!confirm("¿Deseas eliminar este dispositivo del monitor?")) return;
      await fetch(`${SCRIPT_URL}?deleteDevice=${id}`, { redirect: 'follow' });
      loadData();
    }

    async function clearServer() {
      if(!confirm("¿ELIMINAR TODOS LOS LOGS DEL SERVIDOR?")) return;
      await fetch(`${SCRIPT_URL}?clear=true`, { redirect: 'follow' });
      loadData();
    }

    setInterval(loadData, 8000);
    loadData();
  </script>
</body>
</html>
