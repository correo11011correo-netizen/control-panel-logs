<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StockPro Master | Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --bg: #020617; 
      --card: #0f172a; 
      --accent: #6366f1; 
      --success: #10b981; 
      --error: #ef4444; 
      --text: #f8fafc; 
      --text-dim: #94a3b8;
      --border: #1e293b; 
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      margin: 0; 
      padding: 15px;
      line-height: 1.5;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    header { 
      display: flex; 
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px; 
      border-bottom: 1px solid var(--border); 
      padding-bottom: 20px; 
    }

    @media (min-width: 768px) {
      header { flex-direction: row; justify-content: space-between; align-items: center; }
      body { padding: 30px; }
    }

    h1 { 
      font-size: 20px; 
      font-weight: 800; 
      letter-spacing: 1px; 
      color: var(--accent); 
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span { font-weight: 200; color: var(--text-dim); font-size: 0.8em; }

    .grid { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 20px; 
      margin-bottom: 30px; 
    }

    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
    }

    .card { 
      background: var(--card); 
      border-radius: 20px; 
      border: 1px solid var(--border); 
      padding: 20px; 
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, border-color 0.2s;
    }

    .card:active { transform: scale(0.98); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .user-badge {
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .device-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    .model-name {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin: 5px 0;
    }

    .os-info {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .log-container {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 12px;
      margin-top: 15px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .log-item {
      font-size: 13px;
      margin-bottom: 8px;
      color: #cbd5e1;
      display: flex;
      gap: 10px;
      line-height: 1.4;
    }

    .log-item:last-child { margin-bottom: 0; }

    .log-time {
      color: #64748b;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .log-event { font-weight: 700; color: var(--accent); }

    .terminal-section { margin-top: 40px; }

    .terminal-header {
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .terminal { 
      background: #000; 
      border: 1px solid var(--border); 
      border-radius: 16px; 
      padding: 20px; 
      height: 300px; 
      overflow-y: auto; 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 13px; 
      line-height: 1.6;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    .t-msg { color: #a3e635; margin-bottom: 6px; }
    .t-err { color: var(--error); font-weight: bold; }
    .t-time { color: #475569; margin-right: 10px; }

    .btn { 
      background: var(--accent); 
      color: #fff; 
      padding: 12px 24px; 
      border-radius: 12px; 
      border: none; 
      font-weight: 800; 
      cursor: pointer; 
      font-size: 15px;
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
    }

    @media (min-width: 768px) {
      .btn { width: auto; }
    }

    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 10px var(--success);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛰️ STOCKPRO <span>MASTER HUB</span></h1>
      
      <div style="display:flex; flex-direction:column; gap:10px; width:100%;">
        <select id="serverSelect" style="background:#1e293b; color:#fff; border:1px solid var(--border); padding:8px 12px; border-radius:8px; font-size:13px; font-family:'Inter', sans-serif;" onchange="sync()">
          <option value="https://script.google.com/macros/s/AKfycbweUlhXJzUqqmcehuAkTs1MTJV4JVaYs3Y-UrMD6urtCdjP4SsyefgZAZo0AVFK6YU/exec">🟢 SERVIDOR ORIGINAL (AKfycbwe...)</option>
          <option value="https://script.google.com/macros/s/AKfycbxOz64ZdcbALY7G1KLHg8YKBy8yEAShqpuzDygLMQDrIPCRGsw9aXapVzStD-Jhgapjjg/exec">🟠 SERVIDOR NUEVO (AKfycbxO...)</option>
        </select>
        
        <div style="display:flex; gap:10px; justify-content: space-between;">
          <button class="btn" style="background:var(--success); padding: 10px 15px; font-size: 13px; color:#000;" onclick="testServer()">🧪 TEST</button>
          <button class="btn" style="background:#334155; padding: 10px 15px; font-size: 13px;" onclick="clearAll()">LIMPIAR</button>
          <button class="btn" style="padding: 10px 15px; font-size: 13px;" onclick="sync()">RECARGAR</button>
        </div>
      </div>
    </header>

    <div id="grid" class="grid"></div>

    <div class="terminal-section">
      <div class="terminal-header">
        <div class="status-dot"></div>
        LIVE NETWORK LOGS
      </div>
      <div id="term" class="terminal">
        <div class="t-msg"><span class="t-time">00:00:00</span> [SYS] Terminal de monitoreo activa.</div>
      </div>
    </div>
  </div>

  <script>
    function getScriptUrl() {
      const select = document.getElementById('serverSelect');
      return select ? select.value : 'https://script.google.com/macros/s/AKfycbweUlhXJzUqqmcehuAkTs1MTJV4JVaYs3Y-UrMD6urtCdjP4SsyefgZAZo0AVFK6YU/exec';
    }
    
    function log(m, err=false) {
      const t = document.getElementById('term');
      const time = new Date().toLocaleTimeString();
      t.innerHTML += `<div class="${err?'t-err':'t-msg'}"><span class="t-time">${time}</span> ${m}</div>`;
      t.scrollTop = t.scrollHeight;
    }

    async function sync() {
      try {
        const url = getScriptUrl();
        log(`Conectando a ${url.substring(0,50)}...`);
        const callbackName = 'cb_' + Date.now();
        const script = document.createElement('script');
        script.src = `${url}?callback=${callbackName}`;
        
        window[callbackName] = (data) => {
          if(data.status === 'OK') {
            log(`ACTUALIZADO: ${data.logs?.length || 0} eventos recibidos.`);
            render(data.logs || []);
          } else {
            log('ERROR EN RESPUESTA: ' + JSON.stringify(data), true);
          }
          delete window[callbackName];
          document.body.removeChild(script);
        };

        script.onerror = () => {
          log('ERROR DE RED: No se pudo conectar con el servidor. Verifica la URL.', true);
          render([]); // Limpiar grilla si falla
        };

        document.body.appendChild(script);
      } catch (e) {
        log(`ERROR CRÍTICO: ${e.message}`, true);
      }
    }

    async function testServer() {
      const url = getScriptUrl();
      log(`Enviando PING de prueba al servidor seleccionado...`);
      try {
        const payload = {
          deviceId: 'TEST-DEV-001',
          event: 'PING_TEST',
          message: 'Prueba de conexión desde el Panel Web',
          model: 'Panel Web Tester',
          os: 'Navegador Web',
          usuario: 'Administrador',
          version: 'v23-Panel',
          metadata: { bateria: '100%', ubicacion: 'Panel Central' }
        };

        const respuesta = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload),
        });

        const data = await respuesta.json();
        if(data.status === 'success') {
           log('✅ PING EXITOSO: El servidor procesó la prueba correctamente.');
           sync(); // Recargar para ver la tarjeta de prueba
        } else {
           log(`❌ FALLO EN PRUEBA: El servidor devolvió: ${JSON.stringify(data)}`, true);
        }
      } catch(e) {
        log(`❌ FALLO DE RED EN PRUEBA: ${e.message}. Verifica permisos de Google.`, true);
      }
    }

    function getAndroidVersion(apiLevel) {
      const level = parseInt(apiLevel);
      if(isNaN(level)) return apiLevel; // Si no es un número (ej: "iOS 16"), lo devuelve tal cual
      const versions = {
        35: "15", 34: "14", 33: "13", 32: "12L", 31: "12", 30: "11", 
        29: "10", 28: "9 Pie", 27: "8.1 Oreo", 26: "8.0 Oreo"
      };
      return versions[level] ? `Android ${versions[level]} (API ${level})` : `Android API ${level}`;
    }

    function render(logs) {
      const grouped = {};
      
      // Agrupamos por dispositivo, pero tomamos en cuenta el usuario para mayor claridad
      logs.forEach(l => { 
        const key = l.deviceId; // Seguimos agrupando por ID pero mejoramos la visualización
        if(!grouped[key]) grouped[key] = []; 
        grouped[key].push(l); 
      });

      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      // Ordenar por actividad más reciente
      const sortedIds = Object.keys(grouped).sort((a, b) => {
        const lastA = new Date(grouped[a][grouped[a].length - 1].timestamp);
        const lastB = new Date(grouped[b][grouped[b].length - 1].timestamp);
        return lastB - lastA;
      });

      sortedIds.forEach(id => {
        const dLogs = grouped[id].slice().reverse();
        const last = dLogs[0];
        const lastTime = new Date(last.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Extraemos variables seguras
        const meta = last.metadata || {};
        const realOs = last.os ? (last.os.toLowerCase().includes('android') ? getAndroidVersion(last.os.replace(/[^0-9]/g, '')) : last.os) : 'Desconocido';
        const emptyStyle = "color: #ef4444; font-weight: bold; font-size: 10px; font-style: italic;";
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-header">
            <div class="user-badge">${last.usuario || 'Anónimo'}</div>
            <div>
              <button onclick="sendMessage('${id}')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:16px; padding:0 10px;" title="Enviar mensaje">✉️</button>
              <button onclick="deleteDevice('${id}')" style="background:none; border:none; color:var(--error); cursor:pointer; font-size:18px; padding:0 5px;" title="Eliminar dispositivo">&times;</button>
            </div>
          </div>
          <div class="model-name" style="display:flex; align-items:center; gap:8px;">
            ${last.model || 'Dispositivo'}
            ${dLogs.some(l => l.event === 'CRITICAL_HARD_RESET') ? '<span style="background:var(--error); color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:bold; letter-spacing:0.5px;">RESET</span>' : ''}
          </div>
          
          <div style="margin-bottom:10px; font-size:12px; color:var(--text-dim); display:flex; flex-wrap: wrap; gap:10px;">
            <span title="Email del Cliente">✉️ ${meta.email ? `<span style="color:#fff;">${meta.email}</span>` : `<span style="${emptyStyle}">APP SIN ACTUALIZAR</span>`}</span>
            <span title="Teléfono del Cliente">📱 ${meta.phone ? `<span style="color:#fff;">${meta.phone}</span>` : `<span style="${emptyStyle}">APP SIN ACTUALIZAR</span>`}</span>
          </div>

          <div class="os-info" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:15px; font-size:12px;">
            <div style="background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:8px;">
              <div style="color:var(--text-dim); font-size:10px; text-transform:uppercase;">Sistema OS</div>
              <div style="color:#fff; margin-top:2px;">${realOs}</div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:8px;">
              <div style="color:var(--text-dim); font-size:10px; text-transform:uppercase;">Dirección IP</div>
              <div style="color:#fff; margin-top:2px; font-family:'JetBrains Mono', monospace;">${last.ip || '0.0.0.0'}</div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:8px;">
              <div style="color:var(--text-dim); font-size:10px; text-transform:uppercase;">Batería</div>
              <div style="margin-top:2px;">${meta.bateria ? `<span style="color:#fff;">${meta.bateria}</span>` : `<span style="${emptyStyle}">Sin datos</span>`}</div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:8px;">
              <div style="color:var(--text-dim); font-size:10px; text-transform:uppercase;">Versión App</div>
              <div style="margin-top:2px; font-weight:bold; color:var(--accent);">v${last.version || '1.0.0'}</div>
            </div>
            <div style="grid-column: span 2; background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:8px; display:flex; justify-content:space-between;">
              <div>
                <div style="color:var(--text-dim); font-size:10px; text-transform:uppercase;">ID Dispositivo</div>
                <div class="device-id" style="color:#fff; margin-top:2px;">${id}</div>
              </div>
              <div style="text-align:right;">
                <div style="color:var(--text-dim); font-size:10px; text-transform:uppercase;">Ubicación</div>
                <div style="margin-top:2px;">${meta.ubicacion ? `<span style="color:#fff;">${meta.ubicacion}</span>` : `<span style="${emptyStyle}">Sin GPS</span>`}</div>
              </div>
            </div>
          </div>
          
          <div class="log-container">
             ${dLogs.slice(0,5).map(l => {
               const time = new Date(l.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second: '2-digit'});
               const isCritical = l.event.includes('ERROR') || l.event.includes('CRITICAL');
               return `
                <div class="log-item" style="${isCritical ? 'color: #fca5a5;' : ''}">
                  <span class="log-time">${time}</span>
                  <span><span class="log-event" style="${isCritical ? 'color: var(--error);' : ''}">${l.event}</span>: ${l.message}</span>
                </div>`;
             }).join('')}
          </div>
          <div style="margin-top:15px; font-size:11px; color:#475569; display:flex; justify-content:flex-end; align-items:center;">
            <span style="color:var(--success); font-weight:bold;">Última act: ${lastTime}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    async function clearAll() {
      if(!confirm('¿Seguro que quieres borrar TODOS los logs?')) return;
      log('Borrando base de datos completa...');
      try {
        const url = getScriptUrl();
        const script = document.createElement('script');
        script.src = `${url}?deleteAll=true&callback=cb_all`;
        window.cb_all = (res) => {
          log('Base de datos borrada.');
          sync();
          delete window.cb_all;
          document.body.removeChild(script);
        };
        document.body.appendChild(script);
      } catch (e) {
        log(`Error: ${e.message}`, true);
      }
    }

    async function deleteDevice(id) {
      if(!confirm(`¿Eliminar logs del dispositivo ${id}?`)) return;
      log(`Eliminando dispositivo ${id}...`);
      try {
        const url = getScriptUrl();
        const script = document.createElement('script');
        script.src = `${url}?deleteDevice=${id}&callback=cb_delete`;
        window.cb_delete = (res) => {
          log(`Dispositivo eliminado.`);
          sync();
          delete window.cb_delete;
          document.body.removeChild(script);
        };
        document.body.appendChild(script);
      } catch (e) {
        log(`Error al eliminar: ${e.message}`, true);
      }
    }

    async function sendMessage(id) {
      const msg = prompt('Escribe el mensaje de soporte para este dispositivo (Se enviará la próxima vez que el cliente abra la app):');
      if(!msg) return;
      
      log(`Encolando mensaje para ${id}...`);
      try {
        const url = getScriptUrl();
        const script = document.createElement('script');
        // Codificamos el mensaje para que sea seguro enviarlo por URL
        const encodedMsg = encodeURIComponent(msg);
        script.src = `${url}?sendMessageTo=${id}&msgText=${encodedMsg}&callback=cb_msg`;
        window.cb_msg = (res) => {
          log(`Mensaje encolado exitosamente para ${id}.`);
          delete window.cb_msg;
          document.body.removeChild(script);
        };
        document.body.appendChild(script);
      } catch (e) {
        log(`Error al encolar mensaje: ${e.message}`, true);
      }
    }

    setInterval(sync, 15000);
    sync();
  </script>
</body>
</html>
