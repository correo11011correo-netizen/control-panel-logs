<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e293b">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>StockPro - Telemetría y Monitor</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #6366f1; --success: #10b981; --error: #ef4444; --warn: #f59e0b; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: var(--text); }
    h1 { color: #818cf8; text-align: center; margin-bottom: 30px; letter-spacing: 1px; font-weight: 900; }
    
    .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    
    /* PANEL DE ESTADO */
    .status-container { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
    .status-badge { padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; }
    .status-disconnected { background-color: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid var(--error); }
    .status-connected { background-color: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid var(--success); }
    .btn-action { padding: 8px 15px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    .btn-action:hover { opacity: 0.8; }
    .btn-danger { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); color: #fca5a5; }

    /* TARJETAS DE DISPOSITIVO */
    .device-card { background: var(--card); border-radius: 15px; margin-bottom: 15px; overflow: hidden; border: 1px solid #334155; transition: transform 0.2s; }
    .device-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; }
    .device-header:hover { background: rgba(255,255,255,0.02); }
    
    .device-info-main { display: flex; flex-direction: column; gap: 8px; }
    .device-title { font-weight: 900; font-size: 1.2em; color: #fff; display: flex; align-items: center; gap: 10px; }
    .badge-online { background: var(--success); width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px var(--success); }
    .badge-offline { background: #64748b; width: 10px; height: 10px; border-radius: 50%; }
    
    .device-meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
    .meta-item { display: flex; flex-direction: column; }
    .meta-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
    .meta-value { font-size: 13px; color: #cbd5e1; }
    
    /* ÁREA DE LOGS */
    .device-logs { padding: 0 20px 20px 20px; display: none; }
    .device-logs.open { display: block; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
    th, td { padding: 12px 15px; text-align: left; font-size: 13px; }
    th { color: #94a3b8; font-weight: bold; text-transform: uppercase; font-size: 10px; border-bottom: 1px solid #334155; }
    tr { background: rgba(0,0,0,0.2); }
    td:first-child { border-radius: 8px 0 0 8px; color: #64748b; font-family: monospace; }
    td:last-child { border-radius: 0 8px 8px 0; }
    
    .type-INFO { color: #6ee7b7; font-weight: bold; }
    .type-WARNING { color: var(--warn); font-weight: bold; }
    .type-ERROR, .type-CRITICAL { color: #fca5a5; font-weight: bold; }
    
    /* CONSOLA INFERIOR */
    .system-logs { background: #020617; padding: 20px; border-radius: 15px; border: 1px solid #334155; }
    #sysLogContainer { height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 10px; }
    .sys-msg { color: #a3e635; margin-bottom: 4px; }
    
    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🛰️ MONITOR DE FLOTA STOCKPRO</h1>
  
  <div class="container">
    <div class="status-container">
      <div>
        <span id="connectionStatus" class="status-badge status-disconnected">Desconectado</span>
        <span style="margin-left: 15px; font-weight: bold; color: #94a3b8;">Nodos Activos: <span id="totalDevices" style="color:#fff">0</span></span>
      </div>
      <div style="display:flex; gap:10px;">
        <button onclick="clearAllLogs()" class="btn-action btn-danger">🗑️ Limpiar Servidor</button>
        <button onclick="fetchLogs(SCRIPT_URL)" class="btn-action">🔄 Recargar Ahora</button>
      </div>
    </div>

    <div id="devicesContainer">
      <div style="text-align:center; padding:50px; color:#64748b;">Esperando conexión con el servidor...</div>
    </div>
    
    <div class="system-logs">
      <h2 style="margin: 0; color: #818cf8; font-size: 14px;">> TERMINAL DE RED</h2>
      <div id="sysLogContainer">
        <div class="sys-msg">[Sistema] Iniciando monitorización en vivo...</div>
      </div>
    </div>
  </div>

  <script>
    let fetchInterval;
    // IMPORTANTE: Esta URL debe ser la tuya de Google Script generada después de la implementación
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyi4iuMkqdQ5GrY2ODzkjDYumosOJUhJHzD3fGS_PMW1K9RNv5YXKbIPbMrfaud-qiGyA/exec';
    let expandedDevices = new Set(); 

    window.onload = () => {
      startFetching(SCRIPT_URL);
    };

    function logSys(msg) {
      const container = document.getElementById('sysLogContainer');
      const time = new Date().toLocaleTimeString(); 
      container.innerHTML += `<div class="sys-msg">[${time}] ${msg}</div>`;
      container.scrollTop = container.scrollHeight;
    }

    function toggleDevice(deviceId) {
      const logsDiv = document.getElementById(`logs-${deviceId}`);
      if (logsDiv.classList.contains('open')) {
        logsDiv.classList.remove('open');
        expandedDevices.delete(deviceId);
      } else {
        logsDiv.classList.add('open');
        expandedDevices.add(deviceId);
      }
    }

    function startFetching(url) {
      if (fetchInterval) clearInterval(fetchInterval);
      document.getElementById('connectionStatus').textContent = 'Conectando...';
      document.getElementById('connectionStatus').className = 'status-badge status-disconnected';
      fetchLogs(url);
      fetchInterval = setInterval(() => fetchLogs(url), 8000); // Consulta cada 8 segundos
    }

    async function fetchLogs(url) {
      try {
        const response = await fetch(url, { redirect: 'follow' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        
        document.getElementById('connectionStatus').textContent = '📡 Servidor En Línea';
        document.getElementById('connectionStatus').className = 'status-badge status-connected';
        
        updateUI(data.logs || []);
        logSys(`Paquete de red recibido: ${data.logs ? data.logs.length : 0} eventos procesados.`);
      } catch (error) {
        document.getElementById('connectionStatus').textContent = 'Error de Conexión';
        document.getElementById('connectionStatus').className = 'status-badge status-disconnected';
        logSys(`Error de red: ${error.message}`);
      }
    }

    async function deleteDevice(deviceId) {
      if(!confirm(`¿Eliminar todo el registro del dispositivo ${deviceId}?`)) return;
      logSys(`Solicitando borrado del nodo ${deviceId}...`);
      try {
        await fetch(`${SCRIPT_URL}?deleteDevice=${deviceId}`, { method: 'GET', redirect: 'follow' });
        fetchLogs(SCRIPT_URL);
      } catch (e) { logSys(`Error al borrar: ${e.message}`); }
    }

    async function clearAllLogs() {
      if(!confirm(`⚠️ PELIGRO: ¿Borrar la memoria completa del servidor?`)) return;
      try {
        await fetch(`${SCRIPT_URL}?clear=true`, { method: 'GET', redirect: 'follow' });
        fetchLogs(SCRIPT_URL);
      } catch (e) {}
    }

    function updateUI(logs) {
      const grouped = {};
      
      logs.forEach(log => {
        if (!grouped[log.deviceId]) grouped[log.deviceId] = [];
        grouped[log.deviceId].push(log);
      });

      const container = document.getElementById('devicesContainer');
      container.innerHTML = '';
      
      const deviceIds = Object.keys(grouped);
      document.getElementById('totalDevices').textContent = deviceIds.length;

      if (deviceIds.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:50px; color:#64748b;">No hay eventos registrados en el servidor.</div>';
        return;
      }

      deviceIds.forEach(deviceId => {
        const deviceLogs = grouped[deviceId].reverse(); // Más recientes primero
        const latest = deviceLogs[0];
        
        // Calcular estado "En Línea" (Si el último evento fue hace menos de 5 minutos)
        const lastSeen = new Date(latest.timestamp);
        const diffMinutes = (new Date() - lastSeen) / 1000 / 60;
        const isOnline = diffMinutes < 5;
        const statusBadge = isOnline ? '<div class="badge-online" title="En Línea"></div>' : '<div class="badge-offline" title="Desconectado"></div>';
        const timeAgo = isOnline ? 'Ahora' : `Hace ${Math.floor(diffMinutes)} min`;

        const card = document.createElement('div');
        card.className = `device-card`;
        
        card.innerHTML = `
          <div class="device-header" id="header-${deviceId}" onclick="toggleDevice('${deviceId}')">
            <div class="device-info-main">
              <div class="device-title">
                ${statusBadge}
                ${latest.usuario || 'Usuario Anónimo'}
              </div>
              <div class="device-meta-grid">
                <div class="meta-item"><span class="meta-label">ID Dispositivo</span><span class="meta-value">${deviceId}</span></div>
                <div class="meta-item"><span class="meta-label">IP Pública</span><span class="meta-value">${latest.ip || '---'}</span></div>
                <div class="meta-item"><span class="meta-label">Modelo</span><span class="meta-value">${latest.model || 'Genérico'}</span></div>
                <div class="meta-item"><span class="meta-label">Última Conexión</span><span class="meta-value">${timeAgo}</span></div>
              </div>
            </div>
            <button onclick="event.stopPropagation(); deleteDevice('${deviceId}')" class="btn-action btn-danger" style="padding: 5px 10px; font-size:11px;">Eliminar</button>
          </div>
          <div class="device-logs ${expandedDevices.has(deviceId) ? 'open' : ''}" id="logs-${deviceId}">
            <table>
              <thead><tr><th>Hora</th><th>Tipo</th><th>Evento</th><th>Detalle Técnico</th></tr></thead>
              <tbody>
                ${deviceLogs.map(log => {
                  const time = new Date(log.timestamp).toLocaleTimeString();
                  // Extraer nivel del evento (ej: INFO_UPDATE_FOUND -> Tipo: INFO, Evento: UPDATE_FOUND)
                  const parts = log.event.split('_');
                  const type = parts[0];
                  const action = parts.slice(1).join('_');
                  
                  return `
                    <tr>
                      <td>${time}</td>
                      <td class="type-${type}">${type}</td>
                      <td style="color:#fff; font-weight:bold;">${action || log.event}</td>
                      <td style="color:#cbd5e1;">${log.message}</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
