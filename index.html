<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro Master | Command Center</title>
  <style>
    :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --success: #10b981; --error: #ef4444; --text: #f8fafc; --text-muted: #94a3b8; --border: #1e293b; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    h1 { font-size: 18px; font-weight: 900; letter-spacing: 2px; color: var(--accent); margin: 0; }
    
    .stats { display: flex; gap: 20px; margin-bottom: 25px; }
    .stat-box { background: var(--card); padding: 15px 25px; border-radius: 12px; border: 1px solid var(--border); flex: 1; text-align: center; }
    .stat-val { font-size: 24px; font-weight: 900; }
    .stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
    .card-h { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); margin-right: 10px; }
    .dot.off { background: #475569; }
    .user { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; }
    .loc { font-size: 10px; color: var(--accent); font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }

    .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .m-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
    .m-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; display: block; }
    .m-val { font-size: 11px; color: #cbd5e1; font-family: monospace; }

    .actions { padding: 15px 20px; background: rgba(0,0,0,0.1); display: flex; gap: 10px; }
    .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
    .btn-blue { background: var(--accent); color: #fff; }
    .btn-red { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.2); }

    .terminal { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px; }
    .t-msg { margin-bottom: 4px; color: #a3e635; }
    .t-err { color: var(--error); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛰️ STOCKPRO <span style="font-weight:200; color:var(--text-muted);">MASTER HUB</span></h1>
      <button class="btn btn-blue" style="flex:none; padding:10px 20px;" onclick="sync()">FORZAR SYNC</button>
    </header>

    <div class="stats">
      <div class="stat-box"><div id="nNodes" class="stat-val">0</div><div class="stat-lbl">Nodos</div></div>
      <div class="stat-box"><div id="nEvents" class="stat-val">0</div><div class="stat-lbl">Eventos</div></div>
    </div>

    <div id="grid" class="grid"></div>

    <h2 style="font-size:12px; color:var(--accent); margin-bottom:10px;">> LIVE NETWORK TERMINAL</h2>
    <div id="term" class="terminal"><div class="t-msg">[Sistema] Enlace directo activado. Sincronizando...</div></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOLvLctSo-kOk9BznCx_RJIWkIuNbfjs26MueJV28KA-FBVV02gRyxAHfvBbAWOsGPvQ/exec';
    
    function log(m, err=false) {
      const t = document.getElementById('term');
      const time = new Date().toLocaleTimeString();
      t.innerHTML += `<div class="${err?'t-err':'t-msg'}">[${time}] ${m}</div>`;
      t.scrollTop = t.scrollHeight;
    }

    async function sync() {
      try {
        const res = await fetch(SCRIPT_URL, { redirect: 'follow' });
        const data = await res.json();
        render(data.logs || []);
        log(`Comunicación estable: ${data.logs?.length || 0} eventos procesados.`);
      } catch (e) {
        log(`FALLO DE CONEXIÓN: ${e.message}. Reintento automático en curso...`, true);
      }
    }

    function render(logs) {
      const grouped = {};
      logs.forEach(l => { if(!grouped[l.deviceId]) grouped[l.deviceId] = []; grouped[l.deviceId].push(l); });
      
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const ids = Object.keys(grouped);
      document.getElementById('nNodes').textContent = ids.length;
      document.getElementById('nEvents').textContent = logs.length;

      ids.forEach(id => {
        const dLogs = grouped[id].reverse();
        const last = dLogs[0];
        const isOnline = (new Date() - new Date(last.timestamp)) / 1000 / 60 < 5;
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-h">
            <div>
              <div class="loc">${last.usuario || 'Usuario'}</div>
              <div class="user"><div class="dot ${isOnline?'':'off'}"></div>${id.substring(0,12)}...</div>
            </div>
            <div style="font-size:10px; color:var(--text-muted)">${last.version || 'v1.0.0'}</div>
          </div>
          <div style="padding:0 20px 20px">
            <div class="meta">
              <div class="m-box"><span class="m-lbl">IP</span><span class="m-val">${last.ip || '---'}</span></div>
              <div class="m-box"><span class="m-lbl">ESTADO</span><span class="m-val">${isOnline ? 'EN LÍNEA' : 'OFFLINE'}</span></div>
            </div>
          </div>
          <div class="actions">
            <button class="btn btn-red" onclick="del('${id}')">BORRAR</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    async function del(id) {
      if(!confirm("¿Borrar este nodo del monitor?")) return;
      await fetch(`${SCRIPT_URL}?deleteDevice=${id}`, { redirect: 'follow' });
      sync();
    }

    setInterval(sync, 10000);
    sync();
  </script>
</body>
</html>
