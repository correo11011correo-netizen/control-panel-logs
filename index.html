<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro Master | Terminal</title>
  <style>
    :root { --bg: #020617; --card: #0f172a; --accent: #6366f1; --success: #10b981; --error: #ef4444; --text: #f8fafc; --border: #1e293b; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    h1 { font-size: 18px; font-weight: 900; letter-spacing: 2px; color: var(--accent); margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; }
    .terminal { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 11px; }
    .t-msg { color: #a3e635; margin-bottom: 4px; }
    .t-err { color: var(--error); font-weight: bold; }
    .btn { background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛰️ STOCKPRO <span style="font-weight:200; color:#94a3b8;">MASTER HUB</span></h1>
      <button class="btn" onclick="sync()">SINCRONIZAR AHORA</button>
    </header>

    <div id="grid" class="grid"></div>

    <h2 style="font-size:12px; color:var(--accent); margin-bottom:10px;">> LIVE NETWORK LOGS</h2>
    <div id="term" class="terminal"><div class="t-msg">[SYS] Iniciando enlace via AllOrigins (Modo Seguro)...</div></div>
  </div>

  <script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycby_PC4v24holQF45lKU3RmxGV2lNYDuyAV4u5vmDmg/exec';
    
    function log(m, err=false) {
      const t = document.getElementById('term');
      const time = new Date().toLocaleTimeString();
      t.innerHTML += `<div class="${err?'t-err':'t-msg'}">[${time}] ${m}</div>`;
      t.scrollTop = t.scrollHeight;
    }

    async function sync() {
      log('Conectando con Google via Bridge...');
      try {
        // Usamos AllOrigins para saltar el CORS y el limite de 1MB de otros proxies
        const bridgeUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(GOOGLE_URL)}&t=${Date.now()}`;
        const res = await fetch(bridgeUrl);
        const json = await res.json();
        
        // AllOrigins devuelve el JSON de Google dentro del campo 'contents'
        const data = JSON.parse(json.contents);
        
        if(data.status === 'OK' || data.logs) {
           log(`CONEXIÓN EXITOSA: ${data.logs?.length || 0} eventos recibidos.`);
           render(data.logs || []);
        } else {
           throw new Error("Respuesta de Google inválida");
        }
      } catch (e) {
        log(`ERROR: ${e.message}. Reintentando en 10s...`, true);
      }
    }

    function render(logs) {
      const grouped = {};
      logs.forEach(l => { if(!grouped[l.deviceId]) grouped[l.deviceId] = []; grouped[l.deviceId].push(l); });
      
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      Object.keys(grouped).forEach(id => {
        const dLogs = grouped[id].reverse();
        const last = dLogs[0];
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="color:var(--accent); font-size:10px; font-weight:900;">${last.usuario || 'Anónimo'}</div>
          <div style="font-size:16px; font-weight:800; color:#fff; margin: 5px 0;">${id.substring(0,12)}</div>
          <div style="font-size:11px; color:#64748b;">IP: ${last.ip} | VER: ${last.version}</div>
          <div style="margin-top:15px; border-top:1px solid #1e293b; padding-top:10px;">
             ${dLogs.slice(0,3).map(l => `<div style="font-size:10px; margin-bottom:4px; color:#cbd5e1;">> ${l.event}: ${l.message}</div>`).join('')}
          </div>
        `;
        grid.appendChild(card);
      });
    }

    setInterval(sync, 15000);
    sync();
  </script>
</body>
</html>
